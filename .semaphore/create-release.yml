version: v1.0
name: Publish release
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
global_job_config:
  prologue:
    commands:
      - checkout
      - pip install uv
      - export PATH="$HOME/.local/bin:$PATH"
blocks:
  - name: Create release
    run:
      when: "branch = 'main'"
    task:
      secrets:
        - name: semantic-release-credentials
      jobs:
        - name: Collect package details and create GitHub release
          commands:
            - RELEASE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            - python3 scripts/extract_changelog.py /tmp/release-notes.txt
            - 'if [[ $RELEASE_VERSION =~ \.[0-9]+(a|b|rc)[0-9] ]]; then PRERELEASE="--prerelease"; fi'
            - gh release create $RELEASE_VERSION --notes-file /tmp/release-notes.txt $PRERELEASE
