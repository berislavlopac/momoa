version: v1.0
name: Python checks and tests
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
global_job_config:
  prologue:
    commands:
      - checkout
      - pip install uv
      - export PATH="$HOME/.local/bin:$PATH"
blocks:
  - name: Code checks
    dependencies: []
    task:
      jobs:
        - name: checks
          commands:
            - uvx --with tox-uv tox -e checks
  - name: Unit tests
    dependencies:
      - Code checks
    task:
      prologue:
        commands:
          - uv python install $PY_VERSION
      jobs:
        - name: tests
          matrix:
            - env_var: PY_VERSION
              values:
                - '3.11'
                - '3.12'
                - '3.13'
                - '3.14'
          commands:
            - 'PY_ENV=py"${PY_VERSION//.}"'
            - uvx --with tox-uv tox -e $PY_ENV
      epilogue:
        on_pass:
          commands:
            - 'test-results publish "test-reports/$PY_ENV-junit.xml"'
  - name: Publish release
    dependencies:
      - Code checks
      - Unit tests
    run:
      when: "tag =~ '^([1-9][0-9]*!)?(0|[1-9][0-9]*)(\.(0|[1-9][0-9]*))*((a|b|rc)(0|[1-9][0-9]*))?$'"
    task:
      secrets:
        - name: pypi-credentials
        - name: semantic-release-credentials
      jobs:
        - name: Build, publish, and create GitHub release
          commands:
            # hatch-vcs derives the version from the tag, so make sure it is present.
            - git fetch --tags --force
            - uv build
            - uv publish --token $PYPI_PASSWORD
            - python3 scripts/extract_changelog.py "$SEMAPHORE_GIT_TAG_NAME" /tmp/release-notes.txt
            - 'if [[ $SEMAPHORE_GIT_TAG_NAME =~ \.[0-9]+(a|b|rc)[0-9] ]]; then PRERELEASE="--prerelease"; fi'
            - gh release create "$SEMAPHORE_GIT_TAG_NAME" --notes-file /tmp/release-notes.txt $PRERELEASE
after_pipeline:
  task:
    jobs:
      - name: Publish Test Results
        commands:
          - test-results gen-pipeline-report
