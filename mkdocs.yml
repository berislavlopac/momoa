site_name: Momoa
repo_url: https://github.com/berislavlopac/momoa
site_url: https://momoa.readthedocs.io
site_description: Generate typed, self-validating Python classes from JSON Schema at runtime - no code generation.
site_author: Berislav Lopac <berislav@lopac.net>
use_directory_urls: false
theme:
  name: materialx
  favicon: assets/code-json.svg
  icon:
    logo: material/code-json
  palette:
    # Automatic mode: follow the system colour scheme
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
plugins:
  - search
  - mkapi:
      exclude:
        - momoa.format
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: yes
  - codehilite:
      guess_lang: no
nav:
  - index.md
  - API Reference: $api/momoa.**
